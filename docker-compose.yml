version: "3.9"

services:
  # Redis service for caching and Celery broker
  redis:
    image: redis:7-alpine
    container_name: xpervia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xpervia-network
    restart: unless-stopped

  # Django Backend Service
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: xpervia-backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 backend.wsgi:application"
    volumes:
      - ./backend:/app
      - static_files:/app/static
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - PYTHONUNBUFFERED=1
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - xpervia-network
    restart: unless-stopped

  # Celery Worker for async tasks
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xpervia-celery-worker
    command: celery -A backend worker -l info
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - PYTHONUNBUFFERED=1
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - backend
    networks:
      - xpervia-network
    restart: unless-stopped

  # Celery Beat for scheduled tasks
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xpervia-celery-beat
    command: celery -A backend beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - PYTHONUNBUFFERED=1
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - backend
    networks:
      - xpervia-network
    restart: unless-stopped

  # RAG Chatbot Service
  chatbot:
    build:
      context: ./chatbot_service
      dockerfile: Dockerfile
    container_name: xpervia-chatbot
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8001 --workers 2
    volumes:
      - ./chatbot_service:/app
      - chatbot_cache:/app/.cache
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - TOKENIZERS_PARALLELISM=false
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface
    env_file:
      - ./chatbot_service/.env
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - xpervia-network
    restart: unless-stopped
    # Uncomment if you have GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Next.js Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    container_name: xpervia-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - ./frontend/.env.local
    depends_on:
      backend:
        condition: service_healthy
      chatbot:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - xpervia-network
    restart: unless-stopped

networks:
  xpervia-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  static_files:
    driver: local
  chatbot_cache:
    driver: local
